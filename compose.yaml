services:
  mcp:
    build:
      context: .
      target: mcp
      args:
        TINYSEARCH_VERSION: local
    image: tinysearch:local
    ports:
      - "8000:8000"
    shm_size: "1gb"
    volumes:
      - tinysearch-models:/data/models
      - ./configs/research_config.json:/config/research_config.json:ro
    environment:
      TINYSEARCH_MODELS_DIR: /data/models
      TINYSEARCH_CONFIG_PATH: /config/research_config.json
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      SEARXNG_URL: http://searxng:8080/search
    depends_on:
      - searxng

  fastapi:
    build:
      context: .
      target: fastapi
      args:
        TINYSEARCH_VERSION: local
    image: tinysearch-fastapi:local
    profiles:
      - fastapi
    ports:
      - "8001:8000"
    shm_size: "1gb"
    volumes:
      - tinysearch-models:/data/models
      - ./configs/research_config.json:/config/research_config.json:ro
    environment:
      TINYSEARCH_MODELS_DIR: /data/models
      TINYSEARCH_CONFIG_PATH: /config/research_config.json
      SEARXNG_URL: http://searxng:8080/search
    depends_on:
      - searxng

  searxng:
    image: searxng/searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      INSTANCE_NAME: tinysearch-searxng
      BASE_URL: http://localhost:8080/
    restart: unless-stopped

volumes:
  tinysearch-models:
